<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Seu Nome</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .links a {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 12px;
      text-decoration: none;
      color: white;
      border: 1px solid #333;
      border-radius: 10px;
      transition: 0.3s;
    }

    .links a:hover {
      background: #1f1f1f;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 80px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Seu Nome</h1>
    <p>Seu texto / bio aqui</p>

    <div class="links">
      <a href="#">Instagram</a>
      <a href="#">GitHub</a>
      <a href="#">Discord</a>
      <a href="#">Portfólio</a>
    </div>
  </div>

  <div class="footer">
    © 2026 - feito por você
  </div>

</body>
</html>
